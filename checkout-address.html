<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kockac</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="icon" type="image/x-icon" href="assets/kocka-tab.png">
    <link rel="stylesheet" type="text/css" href="styles.css" />
    <link rel="stylesheet" type="text/css" href="login.css">
    <link rel="stylesheet" type="text/css" href="product-detail.css">
</head>
<body>
<main>
    <!--Logo at the top-->
    <div class="text-center mt-4">
        <img src = "assets/kockac-logo-rec.png" alt="Kockáč" height="70">
    </div>
    <!--Delivery-Details Card-->
    <div class="login-container d-flex justify-content-center">
        <div class="checkout-card">
            <h2 class="login-title">Delivery Details</h2>

            <!--First & Last Name-->
            <div class="row gy-3 mb-3">
                <!--First Name input-->
                <div class="col-md-6">
                    <h5>First Name</h5>
                    <input id="first-name" type="text" class="form-control login-input w-100">
                </div>

                <!--Last Name input-->
                <div class="col-md-6">
                    <h5>Last Name</h5>
                    <input id="last-name" type="text" class="form-control login-input w-100">
                </div>
            </div>

            <!--Address & Additional Details-->
            <div class="row gy-3 mb-3">
                <!--Address input-->
                <div class="col-md-6">
                    <h5>Address</h5>
                    <input id="address" type="text" class="form-control login-input w-100">
                </div>

                <!--Additional Details input-->
                <div class="col-md-6">
                    <h5>Additional Details</h5>
                    <input id="additional-details" type="text" class="form-control login-input w-100">
                </div>
            </div>

            <!--Postal Code & City-->
            <div class="row gy-3 mb-3">
                <!--Postal Code input-->
                <div class="col-md-6">
                    <h5>Postal Code</h5>
                    <input id="postal-code" type="text" class="form-control login-input w-100">
                </div>

                <!--City input-->
                <div class="col-md-6">
                    <h5>City</h5>
                    <input id="city" type="text" class="form-control login-input w-100">
                </div>
            </div>

        </div>
    </div>

    <!--Transport Card-->
    <div class="login-container d-flex justify-content-center">
        <div class="checkout-card">
            <h2 class="login-title">Mode of Transport</h2>
            <div class="form-check mb-2">
                <div class="d-flex flex-row align-items-center justify-content-between">
                    <div class="d-flex gap-2">
                        <input class="form-check-input" type="radio" name="flexRadioDefaultD" id="flexRadioDefaultD1">
                        <label class="form-check-label mb-3" for="flexRadioDefaultD1">
                            Distribution point/Z-BOX Packet
                        </label>
                    </div>
                    <img src="assets/packeta-logo.png" alt="Packeta logo"  class="img-fluid" style="max-width: 90px;">
                    <h6><strong>3,99€</strong></h6>
                </div>
            </div>
            <div class="form-check mb-2">
                <div class="d-flex flex-row align-items-center justify-content-between">
                    <div class="d-flex gap-2">
                        <input class="form-check-input" type="radio" name="flexRadioDefaultD" id="flexRadioDefaultD2">
                        <label class="form-check-label mb-3" for="flexRadioDefaultD2">
                            Delivery by DPD SK courier
                        </label>
                    </div>
                    <img src="assets/dpd-logo.png" alt="DPD logo"  class="img-fluid" style="max-width: 90px;">
                    <h6><strong>3,99€</strong></h6>
                </div>
            </div>
            <div class="form-check mb-2">
                <div class="d-flex flex-row align-items-center justify-content-between">
                    <div class="d-flex gap-2">
                        <input class="form-check-input" type="radio" name="flexRadioDefaultD" id="flexRadioDefaultD3">
                        <label class="form-check-label mb-3" for="flexRadioDefaultD3">
                            Delivery by GLS SK courier
                        </label>
                    </div>
                    <img src="assets/gls-logo.png" alt="GLS logo"  class="img-fluid" style="max-width: 90px;">
                    <h6><strong>3,99€</strong></h6>
                </div>
            </div>
            <div class="form-check mb-2">
                <div class="d-flex flex-row align-items-center justify-content-between">
                    <div class="d-flex gap-2">
                        <input class="form-check-input" type="radio" name="flexRadioDefaultD" id="flexRadioDefaultD4">
                        <label class="form-check-label mb-3" for="flexRadioDefaultD4">
                            Delivery by Slovak Post courier
                        </label>
                    </div>
                    <img src="assets/slovak-post-logo.png" alt="Slovak Post logo" class="img-fluid" style="max-width: 90px;">
                    <h6><strong>2,99€</strong></h6>
                </div>
            </div>
        </div>
    </div>

    <!--Payment Card-->
    <div class="login-container d-flex justify-content-center">
        <div class="checkout-card">
            <h2 class="login-title">Payment Method</h2>
            <div class="form-check mb-2">
                <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault1">
                <label class="form-check-label mb-3" for="flexRadioDefault1">
                    Credit / Debit Card
                </label>
                <div class="credit-card-fields d-flex flex-column mb-3 gap-3">
                    <input type="text" class="form-control login-input w-100" placeholder="Card Holder Name">
                    <div class="d-flex flex-row gap-1">
                        <input type="text" class="form-control login-input w-100" placeholder="Card Number">
                        <img src="assets/Visa-MasterCard-icons.png" alt="Visa and MasterCard Icons"  class="img-fluid" style="max-width: 120px;">
                    </div>
                    <div class="d-flex flex-row gap-3">
                        <input type="text" class="form-control login-input w-25" placeholder="Expiry Date (MM/YY)">
                        <input type="text" class="form-control login-input w-25" placeholder="CVV">
                    </div>
                </div>
            </div>

            <div class="form-check mb-2">
                <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault2">
                <label class="form-check-label" for="flexRadioDefault2">
                    Cash on Delivery
                </label>
            </div>
            <div class="form-check mb-2">
                <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault3">
                <label class="form-check-label" for="flexRadioDefault3">
                    Apple Pay / Google Pay
                </label>
            </div>
            <div class="form-check mb-2">
                <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault4">
                <label class="form-check-label" for="flexRadioDefault4">
                    Bank Transfer
                </label>
            </div>
            <hr>
            <div class="col-md-4">
                <h5>Discount Code</h5>
                <input id="discount" type="text" class="form-control login-input w-100">
            </div>
        </div>
    </div>
</main>

<!-- Buttons -->
<div class="d-flex justify-content-between m-3">
    <button onclick="location.href='shopping-cart.html'" class="back-button">Back to Cart</button>
    <button onclick="location.href='#'" class="back-button red">Confirm Order</button>
</div>

<!--Footer-->
<footer class="py-4 px-4">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
        <a href="index.html">
            <img src="assets/kockac-logo-rec.png" alt="Kockáč" height="50">
        </a>
        <div class="footer-links d-flex gap-4">
            <a href="#">Terms &amp; Conditions</a>
            <a href="#">Privacy Policy</a>
        </div>
        <div class="footer-copy">© 2026 Kockac.com · All rights reserved.</div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
