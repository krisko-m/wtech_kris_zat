<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="styles.css" />
    <link rel="stylesheet" type="text/css" href="login.css">
    <title>Kockac</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="icon" type="image/x-icon" href="assets/kocka-tab.png">
</head>
<body>
<main>
    <!--Logo at the top-->
    <div class="text-center mt-4">
        <img src = "assets/kockac-logo-rec.png" alt="Kockáč" height="70">
    </div>
    <!--Login Card-->
    <div class="login-container d-flex justify-content-center">
        <div class = "login-card">
            <h2 class="login-title">Login</h2>

            <!--Email input-->
            <div class="mb-3">
                <input id="email" type="text" class="login-input w-100" placeholder="Email / Username">
            </div>
            <!--Password input-->
            <div class="mb-3">
                <input type="password" class="login-input w-100" placeholder="Password">
            </div>
            <!--Forgot password-->
            <div class="text-start">
                <a href="#" class="login-forgot">Forgot Password?</a>
            </div>

            <!--Login button-->
            <div class="d-grid gap-2"> <button class="login-button">LOG IN</button> </div>

            <!--SignUp link-->
            <div class="text-center mt-3">
                <a href="#" class="login-signup">SIGN UP</a>
            </div>
        </div>
    </div>
</main>

<!-- Back button -->
<div class="login-back">
    <a href="#" class="back-button">Back to Shop</a>
</div>

<!--Footer-->
<footer>
    <a href="#">
        <img src="assets/kockac-logo-rec.png" alt="Kockáč" height="50">
    </a>

    <div class="footer-links">
        <a href="#">Terms & Conditions</a>
        <a href="#">Privacy Policy</a>
    </div>

    <div class="footer-copy">© 2026 Kockac.com· All rights reserved.</div>
</footer>
</body>
</html>
