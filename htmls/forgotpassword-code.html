<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kockac</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="icon" type="image/x-icon" href="../assets/kocka-tab.png">
  <link rel="stylesheet" type="text/css" href="../cssstyles/styles.css" />
  <link rel="stylesheet" type="text/css" href="../cssstyles/login.css">
</head>
<body>
<main>
  <!--Logo at the top-->
  <a href="index.html">
    <div class="text-center mt-4">
      <img src = "../assets/kockac-logo-rec.png" alt="Kockáč" height="70">
    </div>
  </a>
  <!--Code Card-->
  <div class="d-flex justify-content-center p-4">
    <div class = "login-card">
      <h2 class="login-title">Enter Code from E-Mail</h2>
      <!--Code input-->
      <div class="mb-3">
        <input id="email" type="text" class="form-control login-input w-100" placeholder="Code">
      </div>

      <!--Check-code button-->
      <a href="#" class="login-forgot">Resend Code</a>
      <div class="d-grid gap-2"> <button  class="login-button">Check Code</button> </div>

    </div>
  </div>
</main>

<!-- Back button -->
<div class="login-back">
  <button onclick="location.href='index.html'" class="back-button">Back to Shop</button>
</div>

<!--Footer-->
<footer class="py-4 px-4">
  <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
    <a href="index.html">
      <img src="../assets/kockac-logo-rec.png" alt="Kockáč" height="50">
    </a>
    <div class="footer-links d-flex gap-4">
      <a href="#">Terms &amp; Conditions</a>
      <a href="#">Privacy Policy</a>
    </div>
    <div class="footer-copy">© 2026 Kockac.com · All rights reserved.</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
