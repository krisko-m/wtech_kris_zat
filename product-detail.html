<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="styles.css" />
    <link rel="stylesheet" type="text/css" href="product-detail.css">
    <title>Kockac</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="icon" type="image/x-icon" href="assets/kocka-tab.png">
</head>
<body>
<!--Navbar-->
<nav class="top-navbar">
    <a href="#">
        <img src="assets/kockac-logo-rec.png" alt="Kockáč" height="70">
    </a>
    <div class="search-wrap">
        <input type="text" placeholder="Search...">
        <a href="#">
            <img src="assets/icon-search.png" alt="Search" class="search-icon" height="18">
        </a>
    </div>

    <div class="nav-actions">
        <button class="btn-nav">
            <img src="assets/icon-user.png" alt="User" height="40">
        </button>
        <button class="btn-nav">
            <img src="assets/icon-trolley.png" alt="Cart" height="40">
        </button>
    </div>
</nav>

<main>
    <!--Product Section-->
    <div class="product-container">
        <!--Photos-->
        <div class="product-photos">
            <div class="secondary-photos">
                <img src="assets/product-bang.png" alt="Product photo" class="secondary-photo">
                <img src="assets/product-bang.png" alt="Product photo" class="secondary-photo">
                <img src="assets/product-bang.png" alt="Product photo" class="secondary-photo">
            </div>
            <img src="assets/product-bang.png" alt="Main product photo" class="main-photo">
        </div>
    </div>
</main>

<!--Footer-->
<footer>
    <a href="#">
        <img src="assets/kockac-logo-rec.png" alt="Kockáč" height="50">
    </a>

    <div class="footer-links">
        <a href="#">Terms & Conditions</a>
        <a href="#">Privacy Policy</a>
    </div>

    <div class="footer-copy">© 2026 Kockac.com· All rights reserved.</div>
</footer>
</body>
</html>
